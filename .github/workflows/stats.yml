name: Generate Stats Images

on:
  schedule:
    # Roda todo dia à meia-noite (UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-stats-images
    permissions:
      contents: write
    steps:
      - name: Generate stats images
        uses: jstrieb/github-stats@master
        with:
          username: jeanbrito-dev
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Deixe em branco se quiser incluir todos os repositórios
          exclude_repos:
          exclude_langs: